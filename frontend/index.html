<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 期末私教 — 智能伴学平台</title>
  <meta name="description" content="基于 RAG 技术的 AI 期末复习私教，四步伴学工作流帮你高效备考" />

  <!-- CSS 样式表 -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />

  <!-- Markdown 渲染 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" />

  <!-- Favicon（使用 emoji 作为临时方案） -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
</head>

<body>
  <div class="app" id="app">
    <!-- ══════════════════════════════════
         Header — 顶栏
         ══════════════════════════════════ -->
    <header class="header" id="header">
      <div class="header__left">
        <button class="header__btn" id="sidebarToggle" aria-label="切换侧栏">
          <img src="assets/icons/sidebar.svg" alt="" width="17" height="17" />
        </button>
        <div class="header__logo">
          <span class="header__logo-icon">🎓</span>
          AI 期末私教
          <span class="header__tagline">Beta</span>
        </div>
      </div>

      <div class="header__right">
        <button class="header__btn" id="themeToggle" aria-label="切换主题">
          <span id="themeIcon">🌙</span>
          <span class="header__btn-text" id="themeText">暗色</span>
        </button>
        <button class="header__btn" id="historyToggle" aria-label="历史记录">
          <img src="assets/icons/history.svg" alt="" width="17" height="17" />
          历史
        </button>
      </div>
    </header>

    <!-- ══════════════════════════════════
         Body — 主体区域
         ══════════════════════════════════ -->
    <div class="body">
      <!-- ── Sidebar 侧栏 ── -->
      <aside class="sidebar" id="sidebar">
        <!-- 章节导航 -->
        <div class="sidebar__section">
          <div class="sidebar__section-title">📚 课程章节</div>
          <nav class="chapter-list" id="chapterList">
            <!-- 由 JS 动态渲染 -->
          </nav>
        </div>

        <!-- 快捷操作 -->
        <div class="sidebar__section">
          <div class="sidebar__section-title">⚡ 快捷操作</div>
          <div class="quick-actions" id="quickActions">
            <button class="quick-action-btn" data-action="ask-knowledge">
              <span class="quick-action-btn__icon">📝</span>
              <span class="quick-action-btn__text">考点提问</span>
            </button>
            <button class="quick-action-btn" data-action="practice">
              <span class="quick-action-btn__icon">📝</span>
              <span class="quick-action-btn__text">真题演练</span>
            </button>
            <button class="quick-action-btn" data-action="analysis">
              <span class="quick-action-btn__icon">❓</span>
              <span class="quick-action-btn__text">错因分析</span>
            </button>
            <button class="quick-action-btn" data-action="extend">
              <span class="quick-action-btn__icon">🔁</span>
              <span class="quick-action-btn__text">举一反三</span>
            </button>
          </div>
        </div>
      </aside>

      <!-- ── Main 主内容区 ── -->
      <main class="main" id="main">
        <!-- 聊天对话区 -->
        <div class="chat-area" id="chatArea">
          <div class="chat-area__inner" id="chatAreaInner">

            <!-- 欢迎卡片（默认显示，发送消息后隐藏）-->
            <div class="welcome-card" id="welcomeCard">
              <div class="welcome-card__title">你好，我是你的 AI 期末私教 🎓</div>
              <div class="welcome-card__desc">
                我已经学习了你上传的 <strong>50+</strong> 份课程资料<br />
                包括课件、试卷、答案等全部内容。<br />
                告诉我你想复习哪一章，我来帮你梳理考点、出题练习、分析错因。
              </div>
              <div class="welcome-actions">
                <button class="welcome-action-btn" data-welcome="review">
                  <span class="welcome-action-btn__icon">📖</span>
                  开始复习第三章
                </button>
                <button class="welcome-action-btn" data-welcome="quiz">
                  <span class="welcome-action-btn__icon">✏️</span>
                  来一道真题试试
                </button>
                <button class="welcome-action-btn" data-welcome="help">
                  <span class="welcome-action-btn__icon">💡</span>
                  不太清楚怎么用？
                </button>
              </div>
            </div>

            <!-- 消息列表由 JS 动态渲染 -->

          </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-area" id="inputArea">
          <div class="input-area__inner">
            <div class="input-wrapper" id="inputWrapper">
              <textarea
                class="input-field"
                id="inputField"
                placeholder="输入你的问题…（Shift+Enter 换行）"
                rows="1"
                autofocus
                aria-label="消息输入框"
              ></textarea>
              <button class="send-btn" id="sendBtn" disabled aria-label="发送消息">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                  <line x1="22" y1="2" x2="11" y2="13"></line>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
              </button>
            </div>
            <div class="input-hint">按 Enter 发送 · 支持多轮对话 · 内容基于课程知识库生成</div>
          </div>
        </div>
      </main>
    </div>

    <!-- ══════════════════════════════════
         Footer — 步骤指示器
         ══════════════════════════════════ -->
    <footer class="footer" id="footer">
      <div class="footer__inner">
        <nav class="step-indicator" id="stepIndicator" aria-label="学习步骤">
          <div class="step-item step-item--active" data-step="1">
            <span class="step-item__num">1</span>
            考点提问
          </div>
          <div class="step-divider step-divider--active"></div>
          <div class="step-item" data-step="2">
            <span class="step-item__num">2</span>
            真题演练
          </div>
          <div class="step-divider"></div>
          <div class="step-item" data-step="3">
            <span class="step-item__num">3</span>
            错因分析
          </div>
          <div class="step-divider"></div>
          <div class="step-item" data-step="4">
            <span class="step-item__num">4</span>
            举一反三
          </div>
        </nav>
      </div>
    </footer>

    <!-- ══════════════════════════════════
         历史记录抽屉
         ══════════════════════════════════ -->
    <div class="overlay" id="overlay"></div>
    <aside class="history-drawer" id="historyDrawer" role="dialog" aria-label="历史记录">
      <div class="history-drawer__header">
        <h2 class="history-drawer__title">📋 对话历史</h2>
        <button class="history-drawer__close" id="historyClose" aria-label="关闭历史记录">
          <img src="assets/icons/close.svg" alt="" width="16" height="16" />
        </button>
      </div>
      <div class="history-drawer__body" id="historyDrawerBody">
        <div class="history-list" id="historyList">
          <!-- JS 动态渲染 -->
        </div>
      </div>
    </aside>

    <!-- ══════════════════════════════════
         Toast 容器
         ══════════════════════════════════ -->
    <div class="toast-container" id="toastContainer"></div>
  </div>

  <!-- ══════════════════════════════════
       外部 JS 库 (CDN)
       ══════════════════════════════════ -->
  <!-- Markdown 解析 -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
  <!-- 数学公式渲染 -->
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <!-- 代码高亮 -->
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/sql.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/javascript.min.js"></script>

  <!-- 应用脚本（按依赖顺序加载） -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/history.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
