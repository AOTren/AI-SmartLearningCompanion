services:
  - type: web
    name: ai-tutor
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: COZE_API_KEY
        sync: false
      - key: COZE_BOT_ID
        sync: false
